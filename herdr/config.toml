[theme]
name = "one-dark"
auto_switch = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[keys]
prefix = "ctrl+x"

# workspace (C-x prefix: 一段上のプロジェクト単位 / C-x ,=リネーム / C-x Space=navigator一覧)
previous_workspace = "prefix+p"
next_workspace = "prefix+n"
new_workspace = "prefix+c"
rename_workspace = "prefix+comma"
goto = "prefix+space"

# tab (C-x t=新規 / C-x Tab=次 / C-x Shift+Tab=前 / C-x Shift+,=リネーム)
new_tab = "prefix+t"
next_tab = "prefix+tab"
previous_tab = "prefix+shift+tab"
rename_tab = ["prefix+shift+comma", "prefix+<"]

# split (Ghostty 互換: c-x - = 上下分割, c-x ¥ = 左右分割)
# 日本語キーボードの¥キーはshiftなしで¥(U+00A5)を送るため、
# shift+¥相当の"|"ではなくunshiftedの"¥"にバインドする
split_horizontal = "prefix+minus"
split_vertical = ["prefix+¥", "prefix+|"]

# pane (Ghostty 互換: c-x o = 次ペインへ巡回)
# Shift+Tab はタブ(previous_tab)へ譲ったため逆順巡回は無効化。方向移動は C-x h/j/k/l
cycle_pane_next = "prefix+o"
cycle_pane_previous = ""
open_notification_target = "prefix+shift+o" # 既定の prefix+o を退避

# agent
previous_agent = "prefix+>"
next_agent = "prefix+."

[ui]
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true

[theme.custom]
accent = "#a093e2" # 0x96f palette 5 (magenta / 青紫)
