name: CI - Format and Lint

on:
  push:
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.lua"
      - "**/*.sh"
      - "**/*.ps1"
      - "**/*.zsh"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.mts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.jsonc"
      - "biome.json"
      - "stylua.toml"
      - ".styluaignore"
      - ".mise.toml"
      - "mise.toml"
      - "mise/**/*.toml"
      - ".markdown-link-check.json"
      - ".prettierignore"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.lua"
      - "**/*.sh"
      - "**/*.ps1"
      - "**/*.zsh"
      - "**/*.ts"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.mts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.jsonc"
      - "biome.json"
      - "stylua.toml"
      - ".styluaignore"
      - ".mise.toml"
      - "mise.toml"
      - "mise/**/*.toml"
      - ".markdown-link-check.json"
      - ".prettierignore"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    env:
      # Use CI-optimized configuration with minimal toolset
      # Significantly reduces install time compared to default config
      # Note: Local environments use Home Manager for automatic environment detection
      MISE_CONFIG_FILE: ${{ github.workspace }}/mise/config.ci.toml
      # This repository defines tasks in `.mise.toml`; force mise to resolve that filename.
      # `MISE_DEFAULT_CONFIG_FILENAME` is for older mise versions.
      MISE_DEFAULT_CONFIG_FILENAME: ".mise.toml"
      # `MISE_OVERRIDE_CONFIG_FILENAMES` is for newer mise versions.
      MISE_OVERRIDE_CONFIG_FILENAMES: ".mise.toml"
      # Relax network hiccups when fetching tool version metadata
      MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: "60"
      # Use GitHub Actions Lua/LuaRocks instead of mise-managed installs
      MISE_DISABLE_TOOLS: "lua,luajit"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare mise task include path
        run: |
          # `.mise.toml` includes task files under `.config/mise/tasks/*`.
          # In CI checkout directories, this path does not exist by default.
          # Mirror local layout so older mise versions can resolve task definitions.
          [ -e .config ] || ln -s . .config

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev libncurses5-dev

      - name: Import Node.js release key
        run: |
          gpg --keyserver keyserver.ubuntu.com --recv-keys 86C8D74642E67846F8E120284DAA80D1E737BC9F

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          version: "2025.12.13"
          cache: true

      - name: Set up Lua (LuaJIT) for luacheck
        uses: leafo/gh-actions-lua@v12

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Cache LuaRocks packages
        uses: actions/cache@v5
        with:
          path: ~/.luarocks
          key: luarocks-${{ runner.os }}-${{ hashFiles('**/.mise.toml', '**/mise.toml') }}
          restore-keys: |
            luarocks-${{ runner.os }}-

      - name: Install LuaRocks packages
        run: |
          luarocks install --local luacheck
          luarocks install --local busted

      - name: Add LuaRocks bin to PATH
        run: echo "${HOME}/.luarocks/bin" >> "$GITHUB_PATH"

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Deploy dotfiles with Home Manager
        run: mise run hm:deploy

      - name: Verify dotfiles deployment
        run: |
          # エントリーポイントファイルの確認
          for file in .bashrc .bash_profile .zshenv .zshrc .gitconfig .tmux.conf; do
            if [ -L "$HOME/$file" ]; then
              echo "✅ $file は正常にデプロイされました"
            else
              echo "❌ $file のデプロイに失敗しました"
              exit 1
            fi
          done

          # ~/.config/内のシンボリックリンク数を確認
          link_count=$(find ~/.config -maxdepth 1 -type l | wc -l)
          echo "📊 ~/.config/ 内のシンボリックリンク数: $link_count"

          if [ "$link_count" -ge 46 ]; then
            echo "✅ 期待されるファイル数（46個以上）が配置されました"
          else
            echo "⚠️ 配置されたファイル数が期待値より少ない（期待: 46個以上、実際: $link_count個）"
          fi

      - name: Run all CI checks
        run: mise run ci
