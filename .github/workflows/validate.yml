name: Validate Nix Flake

on:
  push:
    paths:
      - ".github/workflows/validate.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "home.nix"
      - "mise/tasks/agents.toml"
      - "scripts/apm-workspace.ps1"
      - "scripts/apm-workspace.sh"
      - "scripts/check-flake-sync.sh"
  pull_request:
    paths:
      - ".github/workflows/validate.yml"
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "home.nix"
      - "mise/tasks/agents.toml"
      - "scripts/apm-workspace.ps1"
      - "scripts/apm-workspace.sh"
      - "scripts/check-flake-sync.sh"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check flake inputs sync
        run: sh ./scripts/check-flake-sync.sh

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Nix flake check
        run: nix flake check

      - name: Validate APM bootstrap helpers
        shell: bash
        run: |
          bash -n ./scripts/apm-workspace.sh
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/apm-workspace.ps1 help >/dev/null

      - name: Build bundle
        run: nix build .#bundle
