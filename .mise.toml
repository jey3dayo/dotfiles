# ========================================
# ~/.config 配下のみで有効にする mise タスク
# プロジェクト固有の集約・mac依存タスクをここで定義
# ========================================

# タスク定義を mise/local-tasks/ から読み込み
[task_config]
includes = [
  ".config/mise/local-tasks/format.toml",
  ".config/mise/local-tasks/lint.toml",
  ".config/mise/local-tasks/test.toml",
  ".config/mise/local-tasks/integration.toml",
  ".config/mise/local-tasks/env.toml",
  ".config/mise/local-tasks/backup.toml",
  ".config/mise/local-tasks/updates.toml",
  ".config/mise/local-tasks/headroom.toml",
  ".config/mise/local-tasks/ci.toml",
  ".config/mise/local-tasks/docs.toml",
]

# ========================================
# Markdown config
# ========================================

[env]
MARKDOWN_LINK_CONFIG = ".markdown-link-check.json"

[hooks]
# Decrypt .env to .env.local on directory enter.
# Keep the hook quiet unless setup-env.sh itself has something meaningful to report.
enter = "mise run --quiet setup-env"
