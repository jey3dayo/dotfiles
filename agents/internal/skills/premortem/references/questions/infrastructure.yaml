# Infrastructure Questions - インフラストラクチャ固有の19問
# カテゴリ: IaC, Networking, Container, CI/CD, Observability

questions:
  # IaC (4問)
  - id: INF-001
    category: iac
    priority: critical
    text: |
      Infrastructure as Code（IaC）は採用されていますか？
      - Terraform、Pulumi、CloudFormation 等の選定根拠は？
      - 環境間（dev/staging/production）の差分管理方法は？
      - ステートファイルの安全な管理（リモートバックエンド、ロック）は？
    triggers:
      - terraform
      - iac
      - infrastructure
      - cloudformation
    relevance_boost:
      domains: [infrastructure]
      maturity: [mvp, production]

  - id: INF-002
    category: iac
    priority: high
    text: |
      IaC のモジュール化・再利用戦略は明確ですか？
      - 共通モジュール（VPC、RDS、ECS等）は定義されていますか？
      - モジュールのバージョニング方法は？
      - 環境固有の変数管理（tfvars、SSM Parameter Store等）は？
    triggers:
      - module
      - reusable
      - terraform-module
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-003
    category: iac
    priority: high
    text: |
      IaC のドリフト検出・修正戦略はありますか？
      - 手動変更によるドリフトの検出方法は？
      - 定期的な plan/diff の実行は自動化されていますか？
      - ドリフト発生時の修正フローは定義されていますか？
    triggers:
      - drift
      - plan
      - compliance
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-004
    category: iac
    priority: medium
    text: |
      IaC の変更レビュープロセスは確立されていますか？
      - plan 出力のレビューフローは？
      - 本番環境への適用時の承認プロセスは？
      - ロールバック手順は文書化されていますか？
    triggers:
      - review
      - approval
      - change-management
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  # Networking (4問)
  - id: INF-005
    category: networking
    priority: critical
    text: |
      ネットワーク設計（VPC、サブネット）は適切ですか？
      - パブリック/プライベートサブネットの分離は？
      - CIDR ブロックのサイズ計画（将来の拡張含む）は？
      - マルチ AZ 構成は考慮されていますか？
    triggers:
      - vpc
      - subnet
      - network
      - cidr
    relevance_boost:
      domains: [infrastructure]
      maturity: [mvp, production]

  - id: INF-006
    category: networking
    priority: critical
    text: |
      ファイアウォール・セキュリティグループの設計は適切ですか？
      - 最小権限の原則に基づくインバウンド/アウトバウンドルールは？
      - セキュリティグループの粒度（サービス単位、レイヤー単位）は？
      - 不要なポートの開放はないですか？
    triggers:
      - security-group
      - firewall
      - network-security
    relevance_boost:
      domains: [infrastructure]
      maturity: [mvp, production]

  - id: INF-007
    category: networking
    priority: high
    text: |
      DNS とロードバランシング設計は明確ですか？
      - Route 53 / Cloud DNS 等の DNS 管理は？
      - ALB / NLB の選択根拠は？
      - ヘルスチェックの設定は適切ですか？
    triggers:
      - dns
      - load-balancer
      - alb
      - route53
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-008
    category: networking
    priority: medium
    text: |
      VPN / PrivateLink の設計は必要ですか？
      - オンプレミスとの接続要件は？
      - サービス間のプライベート通信（VPC Peering、PrivateLink）は？
      - ネットワーク遅延の要件は考慮されていますか？
    triggers:
      - vpn
      - privatelink
      - peering
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  # Container (4問)
  - id: INF-009
    category: container
    priority: critical
    text: |
      コンテナオーケストレーション戦略は定義されていますか？
      - ECS、EKS（Kubernetes）、Fargate の選定根拠は？
      - コンテナのリソース制限（CPU、メモリ）は設定されていますか？
      - オートスケーリングの設定は？
    triggers:
      - kubernetes
      - ecs
      - docker
      - container
    relevance_boost:
      domains: [infrastructure]
      maturity: [mvp, production]

  - id: INF-010
    category: container
    priority: high
    text: |
      コンテナイメージのセキュリティは確保されていますか？
      - ベースイメージの選定基準（Alpine、Distroless等）は？
      - イメージスキャン（Trivy、Snyk等）は CI に組み込まれていますか？
      - イメージの署名・検証は実装されていますか？
    triggers:
      - container-security
      - image-scan
      - trivy
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-011
    category: container
    priority: high
    text: |
      サービスメッシュの導入は検討しましたか？
      - Istio、Linkerd、App Mesh 等の必要性は？
      - サービス間の mTLS は？
      - トラフィック管理（カナリアリリース、A/Bテスト）の要件は？
    triggers:
      - service-mesh
      - istio
      - mtls
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-012
    category: container
    priority: medium
    text: |
      コンテナのログ・メトリクス収集は設計されていますか？
      - コンテナログのルーティング（Fluentd、CloudWatch Logs等）は？
      - メトリクス収集（Prometheus、CloudWatch Metrics等）は？
      - コンテナの healthcheck 設定は適切ですか？
    triggers:
      - container-logging
      - prometheus
      - healthcheck
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  # CI/CD (4問)
  - id: INF-013
    category: ci-cd
    priority: critical
    text: |
      CI/CD パイプラインは安全に設計されていますか？
      - シークレット管理（GitHub Secrets、AWS Secrets Manager等）は？
      - ビルドの再現性（Docker ビルド、ロックファイル）は確保されていますか？
      - パイプラインの権限は最小化されていますか？
    triggers:
      - ci-cd
      - pipeline
      - github-actions
      - security
    relevance_boost:
      domains: [infrastructure]
      maturity: [mvp, production]

  - id: INF-014
    category: ci-cd
    priority: high
    text: |
      デプロイ戦略は定義されていますか？
      - Blue-Green、Canary、Rolling Update のどれを採用しますか？
      - ロールバック手順は自動化されていますか？
      - デプロイ時の健全性チェック（Smoke Test）は？
    triggers:
      - deployment
      - blue-green
      - canary
      - rollback
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-015
    category: ci-cd
    priority: high
    text: |
      環境のプロモーション戦略は明確ですか？
      - dev → staging → production の昇格基準は？
      - 環境間の設定差分の管理方法は？
      - ステージング環境のデータは本番相当ですか？
    triggers:
      - promotion
      - staging
      - environment
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-016
    category: ci-cd
    priority: medium
    text: |
      アーティファクト管理は適切ですか？
      - コンテナイメージのタグ戦略（セマンティック、SHA等）は？
      - アーティファクトの保持期間は定義されていますか？
      - 脆弱なアーティファクトの自動削除は？
    triggers:
      - artifact
      - registry
      - ecr
      - versioning
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  # Observability (3問)
  - id: INF-017
    category: observability
    priority: critical
    text: |
      オブザーバビリティの3本柱（Logs、Metrics、Traces）は整備されていますか？
      - ログの集約・検索基盤（ELK、CloudWatch Logs Insights等）は？
      - メトリクスダッシュボード（Grafana、CloudWatch等）は？
      - 分散トレーシング（OpenTelemetry、X-Ray等）は？
    triggers:
      - observability
      - logging
      - metrics
      - tracing
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-018
    category: observability
    priority: high
    text: |
      アラート設計は適切ですか？
      - アラート疲れ（Alert Fatigue）を防ぐ設計は？
      - アラートのエスカレーション経路は？
      - ページャーデューティ（PagerDuty等）との統合は？
    triggers:
      - alert
      - pagerduty
      - oncall
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]

  - id: INF-019
    category: observability
    priority: medium
    text: |
      コスト監視・最適化の自動化は計画されていますか？
      - クラウドコストの日次/月次レポートは？
      - 未使用リソースの自動検出（Trusted Advisor等）は？
      - リソースタグ付けポリシーは定義されていますか？
    triggers:
      - cost
      - optimization
      - tagging
      - finops
    relevance_boost:
      domains: [infrastructure]
      maturity: [production]
