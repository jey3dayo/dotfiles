# Mobile Apps Questions - モバイルアプリ固有の18問
# カテゴリ: UX, Platform, Performance, Security, Distribution

questions:
  # UX (4問)
  - id: MOB-001
    category: ux
    priority: critical
    text: |
      オフライン対応の戦略は明確ですか？
      - ネットワーク断時にどの機能が利用可能ですか？
      - オフラインデータの保存方法（SQLite、Realm、AsyncStorage等）は？
      - オンライン復帰時のデータ同期戦略（コンフリクト解決含む）は定義されていますか？
    triggers:
      - offline
      - network
      - sync
      - connectivity
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-002
    category: ux
    priority: high
    text: |
      画面遷移とナビゲーション設計は適切ですか？
      - ナビゲーションパターン（Stack、Tab、Drawer）の選択根拠は？
      - ディープリンクへの対応は？
      - 画面遷移時のデータの受け渡し方法は定義されていますか？
    triggers:
      - navigation
      - routing
      - deep-link
      - screen
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-003
    category: ux
    priority: high
    text: |
      プッシュ通知の設計は明確ですか？
      - 通知のタイプ分類（トランザクション、マーケティング、リマインダー）は？
      - 通知の権限リクエストのタイミングと UX は設計されていますか？
      - バッジ数の管理方法は？
    triggers:
      - push-notification
      - notification
      - fcm
      - apns
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-004
    category: ux
    priority: medium
    text: |
      アクセシビリティ対応は計画されていますか？
      - VoiceOver（iOS）/ TalkBack（Android）対応は？
      - ダイナミックフォントサイズへの対応は？
      - カラーコントラスト比（WCAG 2.1 AA基準）は満たしていますか？
    triggers:
      - accessibility
      - a11y
      - voiceover
      - talkback
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  # Platform (4問)
  - id: MOB-005
    category: platform
    priority: critical
    text: |
      クロスプラットフォーム vs ネイティブ、選択根拠は明確ですか？
      - React Native、Flutter、ネイティブ（Swift/Kotlin）の選択理由は？
      - プラットフォーム固有 API（カメラ、位置情報、生体認証等）へのアクセス要件は？
      - チームの技術スタック・スキルセットとの整合性は？
    triggers:
      - react-native
      - flutter
      - swift
      - kotlin
      - cross-platform
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-006
    category: platform
    priority: high
    text: |
      OS バージョンのサポート範囲は定義されていますか？
      - iOS の最低サポートバージョンは？（例: iOS 16+）
      - Android の最低 API レベルは？（例: API 26 / Android 8.0+）
      - サポート範囲の根拠（市場シェア、必要 API）は明確ですか？
    triggers:
      - ios
      - android
      - os-version
      - compatibility
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-007
    category: platform
    priority: high
    text: |
      デバイスの多様性への対応は計画されていますか？
      - 画面サイズ（Phone、Tablet、Foldable）への対応は？
      - 解像度（@1x、@2x、@3x）への対応は？
      - 横向き（Landscape）レイアウトは必要ですか？
    triggers:
      - responsive
      - screen-size
      - tablet
      - foldable
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  - id: MOB-008
    category: platform
    priority: medium
    text: |
      バックグラウンド処理の戦略は定義されていますか？
      - バックグラウンドでの処理要件（位置追跡、音楽再生、同期等）は？
      - iOS のバックグラウンド制限（Background Modes）への対応は？
      - バッテリー消費への影響は考慮されていますか？
    triggers:
      - background
      - battery
      - background-task
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  # Performance (4問)
  - id: MOB-009
    category: performance
    priority: critical
    text: |
      アプリの起動時間目標は設定されていますか？
      - コールドスタート目標（例: < 2秒）は？
      - ウォームスタート目標は？
      - スプラッシュスクリーンの活用は計画されていますか？
    triggers:
      - startup
      - launch
      - cold-start
      - performance
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-010
    category: performance
    priority: high
    text: |
      メモリ使用量の管理は計画されていますか？
      - 画像キャッシュの上限設定は？
      - メモリリークの検出・防止策（Instruments、LeakCanary等）は？
      - 低メモリデバイスへの対応は？
    triggers:
      - memory
      - leak
      - cache
      - performance
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  - id: MOB-011
    category: performance
    priority: high
    text: |
      リスト表示のパフォーマンスは最適化されていますか？
      - FlatList / RecyclerView の仮想化は適切に使用されていますか？
      - セルの再利用（リサイクル）は実装されていますか？
      - 大量データの段階的読み込み（ページネーション、無限スクロール）は？
    triggers:
      - list
      - scroll
      - flatlist
      - recyclerview
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  - id: MOB-012
    category: performance
    priority: medium
    text: |
      ネットワーク通信の最適化は計画されていますか？
      - APIレスポンスのキャッシュ戦略は？
      - 画像の最適化（WebP、プログレッシブJPEG、リサイズ）は？
      - リクエストのバッチ処理や重複排除は？
    triggers:
      - network
      - api
      - image
      - optimization
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  # Security (3問)
  - id: MOB-013
    category: security
    priority: critical
    text: |
      認証情報の安全な保存方法は定義されていますか？
      - iOS Keychain / Android Keystore の使用は？
      - トークンの暗号化保存は実装されていますか？
      - ルート化/脱獄デバイスでの動作ポリシーは？
    triggers:
      - keychain
      - keystore
      - token
      - security
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-014
    category: security
    priority: high
    text: |
      証明書ピンニングは実装されていますか？
      - TLS 証明書のピンニング（Certificate Pinning）は？
      - 証明書ローテーション時の更新戦略は？
      - MitM（中間者攻撃）対策は考慮されていますか？
    triggers:
      - certificate-pinning
      - tls
      - mitm
      - security
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  - id: MOB-015
    category: security
    priority: high
    text: |
      コードの難読化・改ざん検知は実装されていますか？
      - ProGuard / R8（Android）の設定は？
      - iOS のバイナリ保護は？
      - 改ざん検知（Integrity Check）は実装されていますか？
    triggers:
      - obfuscation
      - proguard
      - integrity
      - tamper
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  # Distribution (3問)
  - id: MOB-016
    category: distribution
    priority: critical
    text: |
      アプリストア審査への対応は準備されていますか？
      - App Store Review Guidelines / Google Play Policies の遵守は？
      - プライバシーポリシー、利用規約は用意されていますか？
      - App Tracking Transparency（iOS）への対応は？
    triggers:
      - app-store
      - google-play
      - review
      - privacy
    relevance_boost:
      domains: [mobile-apps]
      maturity: [mvp, production]

  - id: MOB-017
    category: distribution
    priority: high
    text: |
      アプリのアップデート戦略は定義されていますか？
      - 強制アップデートの条件と実装は？
      - OTA（Over-The-Air）アップデート（CodePush等）の活用は？
      - 後方互換性のある API 設計は？
    triggers:
      - update
      - versioning
      - codepush
      - ota
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]

  - id: MOB-018
    category: distribution
    priority: medium
    text: |
      クラッシュ報告・分析基盤は整備されていますか？
      - Crashlytics、Sentry 等のクラッシュ報告ツールは導入されていますか？
      - ANR（Application Not Responding）の検出は？
      - クラッシュフリーレート目標（例: 99.5%以上）は設定されていますか？
    triggers:
      - crash
      - analytics
      - crashlytics
      - sentry
    relevance_boost:
      domains: [mobile-apps]
      maturity: [production]
