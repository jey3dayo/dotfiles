# Security Questions - セキュリティ固有の25問
# カテゴリ: Authentication, Application, Network, Data Protection, Compliance

questions:
  # Authentication (5問)
  - id: SEC-001
    category: authentication
    priority: critical
    text: |
      多要素認証（MFA）の実装計画はありますか？
      - TOTP（Google Authenticator等）、SMS、WebAuthn のどれを採用しますか？
      - SMS ベースの MFA のリスク（SIM スワップ攻撃）は理解していますか？
      - MFA の強制対象（管理者、全ユーザー）は定義されていますか？
    triggers:
      - mfa
      - multi-factor
      - authentication
      - totp
    relevance_boost:
      domains: [security, web-development]
      maturity: [mvp, production]

  - id: SEC-002
    category: authentication
    priority: critical
    text: |
      パスワードポリシーは適切ですか？
      - 最小文字数、複雑性要件（NIST SP 800-63B準拠）は？
      - パスワードの保存方法（bcrypt、argon2、PBKDF2）は？
      - パスワードリスト攻撃（credential stuffing）対策は？
    triggers:
      - password
      - credential
      - bcrypt
      - argon2
    relevance_boost:
      domains: [security, web-development]
      maturity: [mvp, production]

  - id: SEC-003
    category: authentication
    priority: high
    text: |
      セッション管理のセキュリティは確保されていますか？
      - セッションタイムアウト（アイドル、絶対）は設定されていますか？
      - セッションハイジャック対策（セッションID再生成、HTTPOnly Cookie）は？
      - 同時セッション数の制限は？
    triggers:
      - session
      - cookie
      - timeout
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  - id: SEC-004
    category: authentication
    priority: high
    text: |
      OAuth 2.0 / OpenID Connect の実装は安全ですか？
      - Authorization Code Flow（+ PKCE）を使用していますか？
      - Implicit Flow は避けていますか？
      - トークンの保管場所と有効期限は適切ですか？
    triggers:
      - oauth
      - openid
      - pkce
      - oidc
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  - id: SEC-005
    category: authentication
    priority: medium
    text: |
      サービス間認証の方式は定義されていますか？
      - mTLS（相互TLS認証）は実装されていますか？
      - API キーの管理・ローテーション方法は？
      - サービスアカウントの権限は最小化されていますか？
    triggers:
      - service-auth
      - mtls
      - api-key
    relevance_boost:
      domains: [security, infrastructure]
      maturity: [production]

  # Application Security (5問)
  - id: SEC-006
    category: application
    priority: critical
    text: |
      入力検証はすべてのエントリポイントで実装されていますか？
      - サーバーサイドでの検証は必須ですか？（クライアントサイドのみは不十分）
      - 許可リスト（Allowlist）方式を採用していますか？
      - ファイルアップロードの検証（拡張子、MIME、サイズ、コンテンツ）は？
    triggers:
      - input-validation
      - sanitization
      - injection
    relevance_boost:
      domains: [security, web-development]
      maturity: [mvp, production]

  - id: SEC-007
    category: application
    priority: critical
    text: |
      依存関係の脆弱性管理は自動化されていますか？
      - Dependabot、Renovate、Snyk 等の導入は？
      - 脆弱性発見時の対応 SLA は定義されていますか？
      - 重大な脆弱性のブロック基準（CVSS スコア）は？
    triggers:
      - dependency
      - vulnerability
      - snyk
      - dependabot
    relevance_boost:
      domains: [security, web-development]
      maturity: [mvp, production]

  - id: SEC-008
    category: application
    priority: high
    text: |
      セキュアコーディングガイドラインは定義されていますか？
      - OWASP Secure Coding Practices に準拠していますか？
      - コードレビューでのセキュリティチェックリストは？
      - SAST（静的解析）ツール（SonarQube、Semgrep等）は導入されていますか？
    triggers:
      - secure-coding
      - sast
      - code-review
    relevance_boost:
      domains: [security]
      maturity: [production]

  - id: SEC-009
    category: application
    priority: high
    text: |
      エラーハンドリングは情報漏洩を防いでいますか？
      - スタックトレースやデバッグ情報は本番で非表示ですか？
      - エラーメッセージはユーザーに対して汎用的ですか？（攻撃者へのヒントを避ける）
      - エラーログに機密情報（パスワード、トークン）が含まれていませんか？
    triggers:
      - error-handling
      - information-disclosure
      - stack-trace
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  - id: SEC-010
    category: application
    priority: medium
    text: |
      API セキュリティのベストプラクティスは適用されていますか？
      - レート制限（Rate Limiting）は実装されていますか？
      - リクエストサイズの制限は？
      - API ゲートウェイでの認証・認可の集約は？
    triggers:
      - api-security
      - rate-limit
      - gateway
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  # Network Security (5問)
  - id: SEC-011
    category: network
    priority: critical
    text: |
      ネットワークセグメンテーションは適切ですか？
      - DMZ、内部ネットワーク、管理ネットワークの分離は？
      - マイクロセグメンテーション（ゼロトラスト）は検討しましたか？
      - ネットワーク間の通信フローは文書化されていますか？
    triggers:
      - network-segmentation
      - zero-trust
      - dmz
    relevance_boost:
      domains: [security, infrastructure]
      maturity: [production]

  - id: SEC-012
    category: network
    priority: critical
    text: |
      DDoS 対策は実装されていますか？
      - CDN / WAF（CloudFront + WAF、Cloudflare等）の導入は？
      - レイヤー3/4/7 の攻撃への対策は？
      - DDoS 発生時のインシデント対応手順は？
    triggers:
      - ddos
      - waf
      - cdn
      - protection
    relevance_boost:
      domains: [security, infrastructure]
      maturity: [production]

  - id: SEC-013
    category: network
    priority: high
    text: |
      TLS/SSL 設定は最新のベストプラクティスに従っていますか？
      - TLS 1.2 以上のみを許可していますか？
      - 強力な暗号スイート（ECDHE、AES-GCM等）を使用していますか？
      - HSTS（HTTP Strict Transport Security）は設定されていますか？
    triggers:
      - tls
      - ssl
      - hsts
      - encryption
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  - id: SEC-014
    category: network
    priority: high
    text: |
      ネットワーク監視・侵入検知は実装されていますか？
      - IDS/IPS（GuardDuty、Suricata等）の導入は？
      - ネットワークフローログの収集・分析は？
      - 異常トラフィック検出のアラート設定は？
    triggers:
      - ids
      - ips
      - guardduty
      - monitoring
    relevance_boost:
      domains: [security, infrastructure]
      maturity: [production]

  - id: SEC-015
    category: network
    priority: medium
    text: |
      DNS セキュリティは確保されていますか？
      - DNSSEC の導入は検討しましたか？
      - DNS over HTTPS（DoH）/ DNS over TLS（DoT）は？
      - DNS ハイジャック対策は？
    triggers:
      - dns
      - dnssec
      - dns-security
    relevance_boost:
      domains: [security, infrastructure]
      maturity: [production]

  # Data Protection (5問)
  - id: SEC-016
    category: data-protection
    priority: critical
    text: |
      データ分類ポリシーは定義されていますか？
      - 機密レベル（Public、Internal、Confidential、Restricted）の分類基準は？
      - 各レベルに対応する保護措置は？
      - データ取り扱いの教育は実施されていますか？
    triggers:
      - data-classification
      - confidential
      - restricted
    relevance_boost:
      domains: [security, data-systems]
      maturity: [production]

  - id: SEC-017
    category: data-protection
    priority: critical
    text: |
      暗号化キーの管理は安全ですか？
      - KMS（AWS KMS、HashiCorp Vault等）を使用していますか？
      - キーローテーションは自動化されていますか？
      - キーの階層構造（Master Key、Data Key）は設計されていますか？
    triggers:
      - kms
      - key-management
      - encryption
      - vault
    relevance_boost:
      domains: [security, data-systems]
      maturity: [production]

  - id: SEC-018
    category: data-protection
    priority: high
    text: |
      バックアップデータの暗号化は実装されていますか？
      - バックアップの暗号化方式は？
      - バックアップキーの管理は？
      - 暗号化されたバックアップからのリストアテストは？
    triggers:
      - backup
      - encryption
      - restore
    relevance_boost:
      domains: [security, data-systems]
      maturity: [production]

  - id: SEC-019
    category: data-protection
    priority: high
    text: |
      ログに機密情報が含まれていないことは確認されていますか？
      - パスワード、トークン、PII のログ出力防止は？
      - ログのマスキング・フィルタリング機能は？
      - ログ保管場所のアクセス制御は？
    triggers:
      - log-security
      - pii
      - masking
    relevance_boost:
      domains: [security, web-development]
      maturity: [production]

  - id: SEC-020
    category: data-protection
    priority: medium
    text: |
      データ消去（Sanitization）手順は定義されていますか？
      - ストレージ廃棄時のデータ消去方法は？
      - クラウドリソース削除時のデータ残存リスクは？
      - 消去証明の取得方法は？
    triggers:
      - data-sanitization
      - disposal
      - erasure
    relevance_boost:
      domains: [security]
      maturity: [production]

  # Compliance (5問)
  - id: SEC-021
    category: compliance
    priority: critical
    text: |
      適用される法規制・基準は特定されていますか？
      - GDPR、CCPA、個人情報保護法等のプライバシー法は？
      - PCI DSS（決済情報取り扱い）は該当しますか？
      - SOC 2、ISO 27001 等の認証取得予定は？
    triggers:
      - compliance
      - gdpr
      - pci-dss
      - soc2
    relevance_boost:
      domains: [security]
      maturity: [production]

  - id: SEC-022
    category: compliance
    priority: high
    text: |
      セキュリティインシデント対応計画は策定されていますか？
      - インシデント対応チーム（CSIRT）の編成は？
      - インシデントの分類（重大度レベル）と対応手順は？
      - 法的通知義務（72時間以内の報告等）への対応は？
    triggers:
      - incident-response
      - csirt
      - breach
    relevance_boost:
      domains: [security]
      maturity: [production]

  - id: SEC-023
    category: compliance
    priority: high
    text: |
      定期的なセキュリティ評価は計画されていますか？
      - ペネトレーションテストの実施頻度は？
      - 脆弱性評価（VA）の定期実施は？
      - 第三者によるセキュリティ監査は？
    triggers:
      - pentest
      - vulnerability-assessment
      - audit
    relevance_boost:
      domains: [security]
      maturity: [production]

  - id: SEC-024
    category: compliance
    priority: medium
    text: |
      セキュリティ教育・意識向上プログラムはありますか？
      - 開発者向けセキュアコーディング研修は？
      - フィッシング対策トレーニングは？
      - セキュリティポリシーの定期的な周知は？
    triggers:
      - training
      - awareness
      - phishing
    relevance_boost:
      domains: [security]
      maturity: [production]

  - id: SEC-025
    category: compliance
    priority: medium
    text: |
      サードパーティリスク管理は実施されていますか？
      - ベンダーのセキュリティ評価は実施していますか？
      - SaaS/クラウドサービスの SLA にセキュリティ条項は含まれていますか？
      - サードパーティアクセスの監視・制限は？
    triggers:
      - vendor
      - third-party
      - supply-chain
    relevance_boost:
      domains: [security]
      maturity: [production]
