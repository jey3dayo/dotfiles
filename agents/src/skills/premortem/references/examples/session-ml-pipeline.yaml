# Premortem Session Example: ML Pipeline Design

timestamp: "2026-02-20T10:15:00+09:00"

context:
  domain: data-systems
  maturity: mvp
  tech_stack:
    - Python
    - Apache Airflow
    - PostgreSQL
    - S3
    - scikit-learn
  scale: medium
  description: |
    ECサイトの商品レコメンデーション ML パイプラインを構築する計画。
    ユーザーの行動ログを収集し、協調フィルタリングモデルを日次で学習・更新する。
    S3 にデータレイク、PostgreSQL にフィーチャーストアを構築予定。

selected_questions:
  - id: DAT-001
    category: pipeline
    priority: critical
    score: 0.95
    text: |
      データパイプラインの信頼性設計は明確ですか？
      - Exactly-once / At-least-once / At-most-once のどの保証レベルですか？
      - パイプライン障害時のリトライ戦略は？
      - デッドレターキュー（DLQ）の実装は？

  - id: DAT-011
    category: quality
    priority: critical
    score: 0.91
    text: |
      データ品質の定義・測定方法は確立されていますか？
      - 完全性（Completeness）: NULL 率の許容範囲は？
      - 正確性（Accuracy）: データ検証ルールは？
      - 一貫性（Consistency）: ソース間の整合性チェックは？

  - id: DAT-019
    category: processing
    priority: high
    score: 0.87
    text: |
      データ変換の冪等性は保証されていますか？
      - 同じ入力に対して常に同じ出力が得られますか？
      - 再実行時にデータの重複は発生しませんか？

  - id: GEN-017
    category: reliability
    priority: critical
    score: 0.84
    text: |
      バックアップ・リカバリ戦略は明確ですか？
      - バックアップ頻度（毎日、毎時、リアルタイム）は？
      - バックアップの保管場所（別リージョン、別クラウド）は？

  - id: DAT-015
    category: governance
    priority: critical
    score: 0.80
    text: |
      個人情報（PII）の取り扱いポリシーは定義されていますか？
      - PII の分類（直接識別、間接識別）は？
      - マスキング、匿名化、仮名化の使い分けは？

questions_and_responses:
  - question_id: DAT-001
    question_text: "データパイプラインの信頼性設計は明確ですか？"
    response: |
      At-least-once で設計しています。Airflow の retry 機能を使って
      失敗時は最大3回リトライする予定です。DLQ は特に考えていませんでした。
    analysis:
      is_sufficient: false
      missing_concepts:
        - dead_letter_queue
        - idempotent_processing
        - data_deduplication
      risk_level: critical
    follow_up:
      - question: |
          At-least-once の場合、重複データが発生する可能性があります。
          以下を検討していますか？
          - パイプラインの各ステップが冪等であること
          - 重複排除（deduplication）のメカニズム
          - 処理失敗データの退避先（DLQ）
        response: |
          冪等性は意識していませんでした。S3 への書き込みをパーティション単位で
          上書きすることで対応できそうです。DLQ については S3 の別バケットに
          失敗レコードを退避する方向で検討します。

  - question_id: DAT-011
    question_text: "データ品質の定義・測定方法は確立されていますか？"
    response: |
      行動ログの NULL チェックと、ユーザーIDの存在チェックは行う予定です。
      それ以外は特に考えていません。
    analysis:
      is_sufficient: false
      missing_concepts:
        - data_quality_framework
        - anomaly_detection
        - freshness_monitoring
      risk_level: critical
    follow_up:
      - question: |
          ML パイプラインではデータ品質が直接モデル精度に影響します。
          以下の追加チェックを検討していますか？
          - 行動ログのボリューム異常検知（急増・急減）
          - 特徴量の分布チェック（ドリフト検出）
          - データ鮮度の SLA（何時間以内のデータか）
        response: |
          ボリューム異常検知は Airflow の sensor で実装できそうです。
          特徴量のドリフト検出は Great Expectations を導入して対応します。
          データ鮮度は 24 時間以内を SLA として設定します。

  - question_id: DAT-019
    question_text: "データ変換の冪等性は保証されていますか？"
    response: |
      S3 への出力はパーティションキー（日付）で上書きするため冪等です。
      PostgreSQL のフィーチャーストアへの書き込みは UPSERT を使います。
    analysis:
      is_sufficient: true
      missing_concepts: []
      risk_level: covered
      note: 冪等性の設計は適切。パーティション上書き + UPSERT で対応済み。

  - question_id: GEN-017
    question_text: "バックアップ・リカバリ戦略は明確ですか？"
    response: |
      S3 はバージョニングを有効にしています。
      PostgreSQL は RDS の自動バックアップ（7日間保持）を使用します。
      モデルファイルもS3に保存しているのでバージョニングで対応できます。
    analysis:
      is_sufficient: true
      missing_concepts:
        - cross_region_backup
      risk_level: low
      note: 基本的なバックアップは適切。クロスリージョンバックアップは今後の検討事項。

  - question_id: DAT-015
    question_text: "個人情報（PII）の取り扱いポリシーは定義されていますか？"
    response: |
      ユーザーIDは仮名化（ハッシュ化）して使用する予定です。
      個人を直接特定できる情報（氏名、メールアドレス等）はパイプラインに流しません。
    analysis:
      is_sufficient: true
      missing_concepts:
        - data_retention_policy
      risk_level: low
      note: 仮名化方針は適切。データ保持期間の明確化が今後必要。

findings:
  critical:
    - question_id: DAT-001
      title: パイプライン信頼性の設計不足
      description: |
        At-least-once 保証での重複処理対策が未検討。
        DLQ が未設計で、障害時のデータ退避先がない。
      recommendation: |
        1. 各変換ステップの冪等性を保証する設計を文書化
        2. S3 別バケットに DLQ を構築
        3. 重複排除ロジックの実装（パーティション上書き方式）
      resources:
        - https://airflow.apache.org/docs/apache-airflow/stable/concepts/tasks.html#retries

    - question_id: DAT-011
      title: データ品質フレームワークの未整備
      description: |
        基本的な NULL チェック以外のデータ品質管理が未計画。
        ML モデルの精度に直結するため、早急な対応が必要。
      recommendation: |
        1. Great Expectations の導入
        2. ボリューム異常検知の Airflow sensor 実装
        3. 特徴量ドリフト検出の定期実行
      resources:
        - https://greatexpectations.io/
        - https://docs.whylabs.ai/docs/

  low:
    - question_id: GEN-017
      title: クロスリージョンバックアップの未検討
      description: |
        単一リージョンでのバックアップのみ。災害時の対応が不足。
      recommendation: |
        S3 のクロスリージョンレプリケーション（CRR）を検討してください。

  covered:
    - question_id: DAT-019
      title: データ変換の冪等性
    - question_id: DAT-015
      title: PII の仮名化方針

action_items:
  - priority: critical
    title: パイプライン信頼性の強化
    description: 冪等性設計の文書化、DLQ の構築、重複排除ロジックの実装
    resources:
      - https://airflow.apache.org/docs/apache-airflow/stable/
    estimated_hours: 8

  - priority: critical
    title: データ品質フレームワークの導入
    description: Great Expectations 導入、ボリューム監視、ドリフト検出の実装
    resources:
      - https://greatexpectations.io/
    estimated_hours: 12

  - priority: low
    title: クロスリージョンバックアップの検討
    description: S3 CRR の設定、RDS のクロスリージョンリードレプリカ
    resources:
      - https://docs.aws.amazon.com/AmazonS3/latest/userguide/replication.html
    estimated_hours: 4

summary: |
  # セッション結果サマリ

  **発見された盲点**: 2件の重大な盲点を発見しました。

  1. **Critical**: パイプライン信頼性の設計不足
     - At-least-once 保証での重複処理対策が未検討
     - DLQ が未設計で障害時のデータ退避先がない
     - 冪等性の設計文書化と DLQ 構築が急務

  2. **Critical**: データ品質フレームワークの未整備
     - 基本的な NULL チェック以外の品質管理が未計画
     - ML モデル精度に直結するため Great Expectations 導入を推奨
     - ボリューム異常検知と特徴量ドリフト検出の実装が必要

  **良好な点**:
  - データ変換の冪等性（パーティション上書き + UPSERT）は適切
  - PII の仮名化方針は明確

  **次のステップ**:
  1. パイプライン信頼性の強化（8時間見積もり）
  2. データ品質フレームワークの導入（12時間見積もり）
  3. クロスリージョンバックアップの検討（4時間見積もり）

  設計フェーズでこれらの盲点を発見できたことで、
  本番運用開始後のデータ品質問題やパイプライン障害を予防できます。
