# ========================================
# Raspberry Pi mise 設定（最小構成）
# ~/.config/mise/config.pi.toml
# ========================================

[settings]
env_file = '.env.local'
experimental = true
jobs = 2                                    # Raspberry Pi メモリ制約対応: 並列数削減でスワップ回避
disable_backends = ["vfox"]
idiomatic_version_file_enable_tools = []
trusted_config_paths = ["~/src/github.com"]

[settings.pipx]
uvx = true

# ========================================
# ツール定義 (Tools)
# ========================================
# mise で管理する全ツールを定義

[tools]
# ========================================
# Language Runtimes (言語ランタイム - 開発用)
# ========================================
# 注: Python は mise で管理しない。uv が必要に応じて python-build-standalone を取得する
go = "latest"
node = "24"
# FIXME: Temporarily disabled due to luarocks 3.13.0 rockspec parsing issues in CI
# lua = "5.1.5"
# luajit = "latest"

# NOTE (Raspberry Pi):
# - luacheck/luarocks は mise registry/backends と相性が不安定なため tools には定義しない。
# - Lua lint は Nix 側で luacheck を供給して実行する運用に統一する。
# ========================================
# Package Managers (パッケージマネージャー)
# ========================================
"github:astral-sh/uv" = "latest"

# ========================================
# Formatters and Linters (フォーマッター・Linter)
# ========================================
actionlint = "latest"
gitleaks = "latest"
biome = "latest"
prettier = "latest"
# 注: hadolint は macOS/Linux x86_64 のみ (プラットフォーム固有セクション参照)
"pipx:beautysh" = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
taplo = "latest"
yamllint = "latest"

# ========================================
# NPM Global Packages (Node.js グローバルパッケージ)
# ========================================

# ユーティリティ・ツール
# 注: npm 自体は node 同梱版を使用 (mise の npm シムは node 同梱を解決する)
"npm:@antfu/ni" = "latest"
"npm:npm-check-updates" = "latest"
"npm:tsx" = "latest"

# AI・コミット支援
# 注: @openai/codex は除外（391MB大容量パッケージ、Raspberry Piメモリ制約）
"npm:aicommits" = "latest"
"npm:opencommit" = "latest"

# ドキュメント・Lint
"npm:@google/design.md" = "latest"
"npm:markdown-link-check" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:textlint" = "latest"
"npm:textlint-rule-preset-ja-technical-writing" = "latest"

# 環境変数管理
"npm:@dotenvx/dotenvx" = "latest"

# 注: Language Servers は除外 (リモート開発でローカルマシンのLSP使用)

# MCP サーバー (Model Context Protocol)
# 注: 軽量かつサーバー環境で有用なMCPのみ維持
"npm:@upstash/context7-mcp" = "latest"
"npm:o3-search-mcp" = "latest"

# Claude/AI ツール
# 注: デスクトップ開発ツール (dxt, dev3000, ccusage) は除外
"npm:@sasazame/ccresume" = "latest"
"npm:openclaw" = "latest"

# 注: クラウド・インフラツールは除外 (aws-cli で十分)

# ========================================
# CLI Tools (コマンドラインユーティリティ)
# ========================================
# 注: Cargo系ツールは除外（ARM互換性考慮）
eza = "latest"
fd = "latest"
# 注: goimports は Pi で go install 経由のビルドが不安定なため無効化
# "go:golang.org/x/tools/cmd/goimports" = "0.41.0"
"github:cli/cli" = "latest"
jq = "latest"
yazi = "latest"

# ========================================
# タスク設定 (Task Configuration)
# ========================================
# タスク定義は mise/tasks/ ディレクトリに分割されています。
# .mise.toml の [task_config] セクションで読み込まれます。
