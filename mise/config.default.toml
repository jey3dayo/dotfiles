# Mac/Linux/WSL2 共通設定。Raspberry Pi は config.pi.toml。

[settings]
# 共通 settings（env_file / experimental 等）は config.toml 側に定義（詳細は mise/README.md）
jobs = 8
idiomatic_version_file_enable_tools = ["go"]
# /private/var/folders: macOS の一時ディレクトリ（TMPDIR）配下に展開される worktree/sandbox 内の
# mise config を信頼するために追加している
trusted_config_paths = ["~/.config", "~/src/github.com", "/private/var/folders"]

[tools]
# Language Runtimes（システム依存関係用の Node.js/Python は Homebrew で管理）
# NOTE: go/node here diverge from config.windows.toml / config.pi.toml pins with
# no documented rationale (see comments there). Check those files before
# bumping go/node here so a change doesn't silently widen the drift.
deno = "latest"
go = "1.26.4"
julia = "latest"
node = "lts"
python = "3.14"
rust = "stable"  # rustfmt (nvim conform) and cargo:* tool installs
# FIXME: Temporarily disabled due to luarocks 3.13.0 rockspec parsing issues in CI
# lua = "5.1.5"
# luajit = "latest"

# Package Managers
# uv は GitHub のプリビルドバイナリを直接取得する。
# pipx:uv は uvx 経由で uv 自身を入れる自己参照構造になり、
# uv 更新時に `uv tool install uv` が [1/3] install で停滞するため避ける。
"github:astral-sh/uv" = "latest"
bun = "latest"

