# Windows 用設定。

[settings]
# 共通 settings（env_file / experimental / settings.npm.package_manager 等）は config.toml 側に定義（詳細は mise/README.md）
idiomatic_version_file_enable_tools = []
trusted_config_paths = ["~/.config", "~/src/github.com"]
windows_default_inline_shell_args = "cmd /c"
windows_default_file_shell_args = "cmd /c"

[env]
YAMLLINT_CONFIG_FILE = "yamllint/config"
MD_GLOB = "**/*.md"
MD_EXCLUDES = "#node_modules #tmux/plugins #.worktrees #.apm/skills #.claude/skills #.claude/worktrees #.codex/skills #result #result-* #tmp #.kiro #opencode/agents/*.md"
TASK_EXCLUDES = "--exclude .worktrees --exclude .apm/skills --exclude .claude/skills --exclude .claude/worktrees --exclude .codex/skills --exclude result --exclude result-* --exclude tmp --exclude .luarocks --exclude .kiro --exclude tmux/plugins --exclude opencode/agents/*.md --exclude apm.lock.yaml"

[tools]
