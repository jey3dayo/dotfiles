# ========================================
# Windows mise 設定
# ~/.config/mise/config.windows.toml
# ========================================

[settings]
env_file = ".env.local"
experimental = true
disable_backends = ["vfox"]
idiomatic_version_file_enable_tools = []
trusted_config_paths = ["~/.config", "~/src/github.com"]
windows_default_inline_shell_args = "bash -lc"
windows_default_file_shell_args = "bash"

[settings.pipx]
uvx = true

[settings.npm]
package_manager = "pnpm"

[env]
YAMLLINT_CONFIG_FILE = "yamllint/config"
MD_GLOB = "**/*.md"
MD_EXCLUDES = "#node_modules #.worktrees #.apm/skills #.claude/skills #.claude/worktrees #.codex/skills #result #result-* #.kiro"
TASK_EXCLUDES = "--exclude .worktrees --exclude .apm/skills --exclude .claude/skills --exclude .claude/worktrees --exclude .codex/skills --exclude result --exclude result-* --exclude .luarocks --exclude .kiro --exclude apm.lock.yaml"

[tools]
