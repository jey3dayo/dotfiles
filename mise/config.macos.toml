[dotfiles]
# pbs が symlink bundle を拒否するため copy（macOS でのみ apply すること）
"~/Library/Services/RemoveQuarantine.workflow" = { source = "~/.config/macos/services/RemoveQuarantine.workflow", mode = "copy" }

# macOS LaunchAgents（dev.mise.<name>.plist として ~/Library/LaunchAgents に配置）

[bootstrap.macos.launchd.agents.codex-gui-path]
program = "/bin/sh"
args = [
  "-lc",
  'launchctl setenv PATH "$HOME/.mise/shims:$HOME/bin:$HOME/.local/bin:$HOME/.config/scripts:$HOME/.cargo/bin:$HOME/go/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"',
]
run_at_load = true
stdout_path = "~/Library/Logs/codex-gui-path.log"
stderr_path = "~/Library/Logs/codex-gui-path.log"

[bootstrap.macos.launchd.agents.gui-env]
program = "/bin/sh"
args = ["-lc", 'exec "$HOME/.config/scripts/launchd/launchd-gui-env.sh"']
run_at_load = true
stdout_path = "~/Library/Logs/gui-env.log"
stderr_path = "~/Library/Logs/gui-env.log"

[bootstrap.macos.launchd.agents.headroom-proxy]
program = "/bin/sh"
args = ["-lc", 'exec "$HOME/.config/scripts/launchd/launchd-headroom-proxy.sh"']
run_at_load = true
keep_alive = true
stdout_path = "~/.headroom/logs/proxy.stdout.log"
stderr_path = "~/.headroom/logs/proxy.stderr.log"
