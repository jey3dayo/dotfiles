# ========================================
# CI-Optimized mise Configuration
# ~/.config/mise/config.ci.toml
# ========================================
# GitHub Actions CI 専用設定（最小ツールセット）
#
# 最適化:
# - config.default.toml: 全ツール（開発環境用）
# - config.pi.toml: サーバー向け最小セット
# - config.ci.toml: CI必須ツールのみ（最小構成）
# ========================================

[settings]
env_file = '.env.local'
experimental = true
jobs = 4                                                                         # GitHub Actions runners: 2 cores
disable_backends = ["vfox"]
idiomatic_version_file_enable_tools = []
trusted_config_paths = ["~/.config", "~/src/github.com", "/private/var/folders"]

[settings.pipx]
uvx = true

# ========================================
# 環境変数（CI でもローカルと同じ対象範囲を使用）
# ========================================

[env]
YAMLLINT_CONFIG_FILE = "yamllint/config"
MD_GLOB = "**/*.md"
MD_EXCLUDES = "#node_modules #tmux/plugins #fisher #zsh/.zinit #.worktrees #.claude/worktrees #result #result-* #.kiro"
TASK_EXCLUDES = "--exclude .worktrees --exclude .claude/worktrees --exclude result --exclude result-* --exclude .luarocks --exclude .kiro"

# ========================================
# ツール定義 - CI必須ツールのみ
# ========================================

[tools]
# Package Managers
"pipx:uv" = "latest" # uvx for ruff execution
# Runtime
node = "lts"
bun = "latest"
# Formatters and Linters
actionlint = "latest"      # GitHub Actions lint
biome = "latest"           # JS/TS/JSON
prettier = "latest"        # General
shellcheck = "latest"      # Shell lint
shfmt = "latest"           # Shell format
stylua = "latest"          # Lua format
taplo = "latest"           # TOML format
yamllint = "latest"        # YAML lint
"pipx:beautysh" = "latest" # Shell format (Python-based)
# Nix (nixfmt は Homebrew 管理: brew install nixfmt)
# crates.io の statix は別ツールなので、公式 repo の statix crate を指定する
"cargo:https://github.com/oppiliappan/statix" = { version = "tag:v0.5.8", crate = "statix" }
"cargo:deadnix" = "latest"
# NPM Packages
"npm:markdown-link-check" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:tsx" = "latest"
# CLI Tools
fd = "latest"       # File discovery
gitleaks = "latest" # Secret scanning
