# GitHub Actions CI 専用（CI 必須ツールのみの最小構成）。

[settings]
# 共通 settings（env_file / experimental 等）は config.toml 側に定義（詳細は mise/README.md）
jobs = 4                                 # GitHub Actions runners: 2 cores
idiomatic_version_file_enable_tools = []
# /private/var/folders: macOS の一時ディレクトリ（TMPDIR）配下の worktree/sandbox 用（CI が Linux runner の場合は実質未使用）
trusted_config_paths = ["~/.config", "~/src/github.com", "/private/var/folders"]

[env]
YAMLLINT_CONFIG_FILE = "yamllint/config"
MD_GLOB = "**/*.md"
MD_EXCLUDES = "#node_modules #tmux/plugins #fisher #zsh/.zinit #.worktrees #.apm/skills #.claude/skills #.claude/worktrees #.codex/skills #result #result-* #tmp #.kiro #opencode/agents/*.md"
TASK_EXCLUDES = "--exclude .worktrees --exclude .apm/skills --exclude .claude/skills --exclude .claude/worktrees --exclude .codex/skills --exclude result --exclude result-* --exclude tmp --exclude .luarocks --exclude .kiro --exclude tmux/plugins --exclude opencode/agents/*.md --exclude apm.lock.yaml"

[tools]
# uvx for ruff execution (pipx:uv は自己参照更新で停滞するため避ける)
"github:astral-sh/uv" = "latest"
node = "lts"
bun = "latest"
actionlint = "latest"
biome = "latest"
prettier = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
taplo = "latest"
yamllint = "latest"
"pipx:beautysh" = "latest"
"npm:markdown-link-check" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:tsx" = "latest"
fd = "latest"
gitleaks = "latest"
