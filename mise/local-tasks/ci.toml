# ========================================
# CI/CD
# ========================================

# ----------------------------------------
# 個別タスク（コマンド）
# ----------------------------------------

["ci:gitleaks"]
description = "gitleaks による secret スキャン"
run = "bash ./scripts/mise-ci.sh gitleaks"

["ci:verify-deploy"]
description = "mise dotfiles デプロイの検証（適用して収束を確認）"
run = "bash ./scripts/mise-ci.sh verify-deploy"

["ci:install"]
description = "CI に必要な追加ツールをインストール"
run = "bash ./scripts/mise-ci.sh install"

# ----------------------------------------
# 集約タスク（エイリアス）
# ----------------------------------------

["ci:quick"]
description = "軽量チェック（format + lint のみ、Claude Code hooks 向け ~3-5s）"
run = "bash ./scripts/mise-ci.sh quick"
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-wsl-task.ps1 -TaskName ci:quick"

["pre-push"]
description = "push 前チェック（ci:quick + 変更ファイルに応じた追加テスト）"
run = "sh \"$HOME/.config/mise/lib/pre-push-check.sh\""

["ci"]
description = "すべての CI チェックをローカル実行（検証のみ、書き込みなし）"
run = "bash ./scripts/mise-ci.sh full"
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-wsl-task.ps1 -TaskName ci"

["ci:full"]
description = "CI チェック + デプロイ + 検証（GitHub Actions と同じワークフロー）"
run = [{ task = "ci:verify-deploy" }, { task = "ci" }]
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-wsl-task.ps1 -TaskName ci:full"

["ci:quick:windows"]
description = "Windows 向け軽量チェック（WSL スナップショット経由）"
run = [{ task = "ci:quick" }]

["ci:windows"]
description = "Windows 向け CI チェック（WSL スナップショット経由）"
run = [{ task = "ci" }]

["ci:full:windows"]
description = "Windows 向け CI フルチェック（WSL スナップショット経由）"
run = [{ task = "ci:full" }]
