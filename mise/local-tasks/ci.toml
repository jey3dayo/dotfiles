# ========================================
# CI/CD
# ========================================

# ----------------------------------------
# 個別タスク（コマンド）
# ----------------------------------------

["ci:gitleaks"]
description = "gitleaks による secret スキャン"
run = """
if [ "${SKIP_GITLEAKS:-0}" = "1" ]; then
  echo "Skip ci:gitleaks (SKIP_GITLEAKS=1)"
  exit 0
fi

if ! command -v gitleaks >/dev/null 2>&1; then
  echo "Error: gitleaks not found. Install gitleaks or run with SKIP_GITLEAKS=1"
  exit 1
fi

gitleaks git -v
"""

["ci:verify-deploy"]
description = "mise dotfiles デプロイの検証（適用して収束を確認）"
run = """
mise dotfiles apply --yes --force
mise dotfiles status --missing
echo "✅ mise dotfiles はすべて適用済みです"
"""

["ci:install"]
description = "CI に必要な追加ツールをインストール"
run = """
luarocks install --local luacheck
luarocks install --local busted
"""

# ----------------------------------------
# 集約タスク（エイリアス）
# ----------------------------------------

["ci:quick"]
description = "軽量チェック（format + lint のみ、Claude Code hooks 向け ~3-5s）"
run = """
if [ "${MISE_WSL_SNAPSHOT:-0}" != "1" ] && [ "${PWD#/mnt/}" != "$PWD" ]; then
  bash ./scripts/mise-wsl-task.sh ci:quick
else
  mise run check:format
  mise run check:lint:quick
fi
"""
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-wsl-task.ps1 -TaskName ci:quick"

["pre-push"]
description = "push 前チェック（ci:quick + 変更ファイルに応じた追加テスト）"
run = "sh \"$HOME/.config/mise/lib/pre-push-check.sh\""

["ci"]
description = "すべての CI チェックをローカル実行（検証のみ、書き込みなし）"
run = """
if [ "${MISE_WSL_SNAPSHOT:-0}" != "1" ] && [ "${PWD#/mnt/}" != "$PWD" ]; then
  bash ./scripts/mise-wsl-task.sh ci
else
  mise run check
  mise run test:ts
  mise run test:lua
  mise run ci:gitleaks
fi
"""
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-wsl-task.ps1 -TaskName ci"

["ci:full"]
description = "CI チェック + デプロイ + 検証（GitHub Actions と同じワークフロー）"
run = [{ task = "ci:verify-deploy" }, { task = "ci" }]
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-wsl-task.ps1 -TaskName ci:full"

["ci:quick:windows"]
description = "Windows 向け軽量チェック（WSL スナップショット経由）"
run = [{ task = "ci:quick" }]

["ci:windows"]
description = "Windows 向け CI チェック（WSL スナップショット経由）"
run = [{ task = "ci" }]

["ci:full:windows"]
description = "Windows 向け CI フルチェック（WSL スナップショット経由）"
run = [{ task = "ci:full" }]
