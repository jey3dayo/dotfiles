# ========================================
# 統合タスク（セットアップ・診断・一括実行）
# ========================================
# 複数のサブタスクを組み合わせた統合タスク

[setup]
description = "初回セットアップ: ツールインストール、依存関係の確認"
run = "bash ./scripts/mise-setup.sh"

[doctor]
description = "環境診断: インストール済みツールと設定を確認"
run = "bash ./scripts/mise-doctor.sh"

[format]
description = "コードとドキュメントの自動フォーマット（書き込みあり）"
run = [
  { tasks = [
    "format:biome",
    "format:prettier",
    "format:markdown",
    "format:yaml",
    "format:lua",
    "format:shell",
    "format:toml",
    "format:python",
  ] },
]

[lint]
# lint:links（外部URLチェック）を含む完全版。ci タスク経由で GitHub Actions でも実行される。
# 高速版は lint:quick を使うこと（lint:links 除外、~3-5s）。
description = "静的解析・構文チェックの集約タスク（書き込みなし）"
depends = [
  "lint:biome",
  "lint:markdown",
  "lint:yaml",
  "lint:lua",
  "lint:shell",
  "lint:python",
  "lint:dockerfile",
  "lint:links",
  "lint:actions",
]

["lint:quick"]
description = "静的解析・構文チェックの軽量集約（lint:links を除外）"
depends = [
  "lint:biome",
  "lint:markdown",
  "lint:yaml",
  "lint:lua",
  "lint:shell",
  "lint:python",
  "lint:dockerfile",
  "lint:actions",
]

["check:format"]
description = "フォーマットチェック集約（書き込みなし）"
run = [
  { tasks = [
    "format:biome:check",
    "format:prettier:check",
    "format:markdown:check",
    "format:yaml:check",
    "format:lua:check",
    "format:shell:check",
    "format:toml:check",
    "format:python:check",
  ] },
]

["check:lint"]
description = "lint チェック集約（check タスクからの呼び出し用エイリアス）"
run = [{ task = "lint" }]

["check:lint:quick"]
description = "lint チェック集約の軽量版（lint:links を除外）"
run = [{ task = "lint:quick" }]

[check]
description = "CI向け総合チェック（check:format + check:lint）"
run = [{ tasks = ["check:format", "check:lint"] }]
