# ========================================
# 更新タスク（mac/local 依存）
# ========================================

["update"]
description = "リポジトリを pull してから、すべての依存関係を更新"
run = [
  { task = "pull" },
  { task = "update:apt" },
  { tasks = [
    "update:brew",
    "update:mise",
  ] },
]

["pull"]
description = "現在のリポジトリを fast-forward pull"
run = "git pull --ff-only"

["update:submodules"]
description = "Git サブモジュールを最新に更新（ローカル変更を破棄、ネストは固定コミットに同期）"
run = "bash ./scripts/update-submodules.sh"
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-update.ps1 -TaskName submodules"

["update:brew"]
description = "Homebrew パッケージを更新（formula のみ、cask は除く）"
run = "if command -v brew >/dev/null 2>&1; then brew update && brew upgrade --formula; else echo 'Homebrew not installed, skipping brew update'; fi"
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-update.ps1 -TaskName brew"

["update:mise"]
description = "mise 管理ツールを更新"
run = "mise upgrade"
run_windows = "mise upgrade"

["update:apt"]
description = "APT パッケージを更新（Ubuntu/Debian 環境）"
run = "if command -v apt-get >/dev/null 2>&1 && [ -f /etc/debian_version ]; then sudo apt-get update && sudo apt-get upgrade -y; else echo 'APT not available, skipping apt update'; fi"
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-update.ps1 -TaskName apt"

["setup:tauri:ubuntu"]
description = "Tauri アプリ開発に必要な Ubuntu/WSL システム依存をインストール"
run = "if command -v apt-get >/dev/null 2>&1 && [ -f /etc/debian_version ]; then sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf; else echo 'APT not available, skipping Tauri system deps'; fi"

["update:external-repos"]
description = "外部 Git リポジトリを更新（強制リセット）"
run = [
  "if [ -d ~/src/github.com/brookhong/Surfingkeys ]; then cd ~/src/github.com/brookhong/Surfingkeys && git fetch origin && git reset --hard origin/master && git clean -fd; else echo 'Skip: ~/src/github.com/brookhong/Surfingkeys not found'; fi",
]
run_windows = "sh ./scripts/windows/run-windows-powershell.sh ./scripts/windows/mise-update.ps1 -TaskName external-repos"
