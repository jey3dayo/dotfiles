# ========================================
# Headroom local AI context optimization
# ========================================

["headroom:status"]
description = "Check Headroom CLI, MCP, proxy, and RTK manual-mode status"
run = '''
#!/usr/bin/env bash
set -euo pipefail

echo "== headroom =="
command -v headroom
headroom --version

echo
echo "== mcp =="
headroom mcp status || true
if rg -n "mcp_servers\\.headroom|command = \"headroom\"|args = \\[\"mcp\", \"serve\"\\]" "$HOME/.codex/config.toml" >/dev/null 2>&1; then
  echo "Codex config: headroom MCP registered"
else
  echo "Codex config: headroom MCP not found"
fi

echo
echo "== proxy =="
if curl -fsS http://127.0.0.1:${HEADROOM_PORT:-8787}/livez >/dev/null 2>&1; then
  curl -fsS http://127.0.0.1:${HEADROOM_PORT:-8787}/readyz
else
  echo "Headroom proxy is not running on 127.0.0.1:${HEADROOM_PORT:-8787}"
fi

echo
echo "== rtk rewrite mode =="
if [ -f "$HOME/.config/.rtk/rewrite-mode" ]; then
  sed -n '1p' "$HOME/.config/.rtk/rewrite-mode"
else
  echo "on"
fi

echo
echo "== codex app launch env =="
echo "OPENAI_BASE_URL=${OPENAI_BASE_URL:-$(launchctl getenv OPENAI_BASE_URL || true)}"
'''

["headroom:mcp:install"]
description = "Register Headroom MCP for supported local agents"
run = "headroom mcp install"

["headroom:tools:install"]
description = "Pre-fetch Headroom bundled helper tools"
run = "headroom tools install"

["headroom:tools:doctor"]
description = "Inspect Headroom bundled helper tool availability"
run = "headroom tools doctor"

["headroom:proxy"]
description = "Start Headroom proxy for explicit A/B testing against RTK manual mode"
run = '''
#!/usr/bin/env bash
set -euo pipefail

log_dir="${HEADROOM_LOG_DIR:-$HOME/.headroom/logs}"
mkdir -p "$log_dir"

exec headroom proxy \
  --host 127.0.0.1 \
  --port "${HEADROOM_PORT:-8787}" \
  --mode "${HEADROOM_MODE:-cache}" \
  --no-learn \
  --no-memory-tools \
  --no-telemetry \
  --log-file "$log_dir/proxy.jsonl"
'''

["headroom:proxy:passthrough"]
description = "Start Headroom proxy in passthrough mode for transport-only comparison"
run = '''
#!/usr/bin/env bash
set -euo pipefail

log_dir="${HEADROOM_LOG_DIR:-$HOME/.headroom/logs}"
mkdir -p "$log_dir"

exec headroom proxy \
  --host 127.0.0.1 \
  --port "${HEADROOM_PORT:-8787}" \
  --no-optimize \
  --no-learn \
  --no-memory-tools \
  --no-telemetry \
  --log-file "$log_dir/proxy-passthrough.jsonl"
'''

["headroom:codex-app:on"]
description = "Route newly launched Codex App processes through Headroom proxy"
run = '''
#!/usr/bin/env bash
set -euo pipefail

base_url="http://127.0.0.1:${HEADROOM_PORT:-8787}/v1"
launchctl setenv OPENAI_BASE_URL "$base_url"
echo "Set OPENAI_BASE_URL=$base_url for future GUI app launches."
echo "Restart Codex App for this to take effect."
'''

["headroom:codex-app:off"]
description = "Remove Headroom proxy routing from future Codex App launches"
run = '''
#!/usr/bin/env bash
set -euo pipefail

launchctl unsetenv OPENAI_BASE_URL
echo "Unset OPENAI_BASE_URL for future GUI app launches."
echo "Restart Codex App for this to take effect."
'''

["headroom:codex-app:status"]
description = "Show Codex App Headroom routing environment"
run = '''
#!/usr/bin/env bash
set -euo pipefail

value="$(launchctl getenv OPENAI_BASE_URL || true)"
if [ -n "$value" ]; then
  echo "OPENAI_BASE_URL=$value"
else
  echo "OPENAI_BASE_URL is not set in launchctl."
fi
'''
