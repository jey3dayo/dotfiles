# ========================================
# CI/CD
# ========================================

# ----------------------------------------
# 個別タスク（コマンド）
# ----------------------------------------

["ci:gitleaks"]
description = "gitleaks による secret スキャン"
run = """
if [ "${SKIP_GITLEAKS:-0}" = "1" ]; then
  echo "Skip ci:gitleaks (SKIP_GITLEAKS=1)"
  exit 0
fi

if ! command -v gitleaks >/dev/null 2>&1; then
  echo "Error: gitleaks not found. Install gitleaks or run with SKIP_GITLEAKS=1"
  exit 1
fi

gitleaks git -v
"""

["ci:verify-deploy"]
description = "Home Manager デプロイの検証（エントリーポイント・シンボリックリンク確認）"
depends = ["hm:deploy"]
run = """
# エントリーポイントファイルの確認
for file in .bashrc .bash_profile .zshenv .zshrc .gitconfig .tmux.conf; do
  if [ -L "$HOME/$file" ]; then
    echo "✅ $file は正常にデプロイされました"
  else
    echo "❌ $file のデプロイに失敗しました"
    exit 1
  fi
done

# ~/.config/内のシンボリックリンク数を確認
link_count=$(find ~/.config -maxdepth 1 -type l | wc -l)
echo "📊 ~/.config/ 内のシンボリックリンク数: $link_count"

if [ "$link_count" -ge 46 ]; then
  echo "✅ 期待されるファイル数（46個以上）が配置されました"
else
  echo "⚠️ 配置されたファイル数が期待値より少ない（期待: 46個以上、実際: $link_count個）"
fi
"""

["ci:install"]
description = "CI に必要な追加ツールをインストール"
run = """
luarocks install --local luacheck
luarocks install --local busted
"""

# ========================================
# Nix 固有検証
# ========================================

["nix:check"]
description = "nix flake check を実行"
run = """
if [ "${SKIP_NIX_VALIDATE:-0}" = "1" ]; then
  echo "Skip nix:check (SKIP_NIX_VALIDATE=1)"
  exit 0
fi

. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix or run with SKIP_NIX_VALIDATE=1" || exit $?

nix flake check
"""

["nix:build:default"]
description = "nix build .#default を実行"
run = """
if [ "${SKIP_NIX_VALIDATE:-0}" = "1" ]; then
  echo "Skip nix:build:default (SKIP_NIX_VALIDATE=1)"
  exit 0
fi

. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix or run with SKIP_NIX_VALIDATE=1" || exit $?

nix build .#default
"""

# ----------------------------------------
# 集約タスク（エイリアス）
# ----------------------------------------

["ci:quick"]
description = "軽量チェック（format + lint のみ、Claude Code hooks 向け ~3-5s）"
run = """
if [ "${MISE_WSL_SNAPSHOT:-0}" != "1" ] && [ "${PWD#/mnt/}" != "$PWD" ]; then
  bash ./scripts/mise-wsl-task.sh ci:quick
else
  mise run check:format
  mise run check:lint:quick
fi
"""

["ci"]
description = "すべての CI チェックをローカル実行（検証のみ、書き込みなし）"
run = """
if [ "${MISE_WSL_SNAPSHOT:-0}" != "1" ] && [ "${PWD#/mnt/}" != "$PWD" ]; then
  bash ./scripts/mise-wsl-task.sh ci
else
  mise run check
  mise run test:ts
  mise run test:lua
  mise run ci:gitleaks
fi
"""

["ci:full"]
description = "CI チェック + デプロイ + 検証（GitHub Actions と同じワークフロー）"
run = [{ task = "ci:verify-deploy" }, { task = "ci" }]

["ci:quick:windows"]
description = "Windows 向け軽量チェック（WSL スナップショット経由）"
run = [{ task = "ci:quick" }]

["ci:windows"]
description = "Windows 向け CI チェック（WSL スナップショット経由）"
run = [{ task = "ci" }]

["ci:full:windows"]
description = "Windows 向け CI フルチェック（WSL スナップショット経由）"
run = [{ task = "ci:full" }]

["ci:nix"]
description = "Nix 固有の深い検証（validate.yml 対応）"
depends = ["nix:check", "nix:build:default", "hm:check"]
