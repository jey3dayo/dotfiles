[backup]
description = "Run restic backup to S3"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" backup'

["backup:init"]
description = "Initialize restic repository on S3"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" init'

["backup:snapshots"]
description = "List backup snapshots"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" snapshots'

["backup:stats"]
description = "Show restic repository stats"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" stats'

["backup:restore"]
description = "Restore latest snapshot to ./restore"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" restore ./restore'

["backup:prune"]
description = "Prune unreferenced data from restic repository"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" prune'

["backup:check"]
description = "Check restic repository integrity (10% data subset)"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" check'

["backup:cleanup"]
description = "Remove all snapshots except the latest one, then prune"
run = 'dotenvx run -f "${XDG_CONFIG_HOME:-$HOME/.config}/.env" -- "${XDG_CONFIG_HOME:-$HOME/.config}/restic/backup.sh" cleanup'
