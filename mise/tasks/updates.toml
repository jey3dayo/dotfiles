# ========================================
# 更新タスク（mac/local 依存）
# ========================================

["update"]
description = "すべての依存関係を更新"
depends = [
  "update:submodules",
  "update:brew",
  "update:apt",
  "update:external-repos",
]

["update:submodules"]
description = "Git サブモジュールを最新に更新（ローカル変更を破棄、ネストは固定コミットに同期）"
run = """
if [ ! -f .gitmodules ]; then
  echo "No submodules configured, skipping"
  exit 0
fi

clear_stale_index_lock() {
  repo_label="$1"
  lock_path=$(git rev-parse --git-path index.lock)

  if [ ! -f "$lock_path" ]; then
    return 0
  fi

  if command -v lsof >/dev/null 2>&1; then
    if lsof "$lock_path" >/dev/null 2>&1; then
      echo "Active git index.lock detected for $repo_label: $lock_path" >&2
      return 1
    fi
  elif command -v fuser >/dev/null 2>&1; then
    if fuser "$lock_path" >/dev/null 2>&1; then
      echo "Active git index.lock detected for $repo_label: $lock_path" >&2
      return 1
    fi
  else
    echo "Warning: neither lsof nor fuser is available; removing existing git index.lock for $repo_label" >&2
  fi

  echo "Removing stale git index.lock for $repo_label: $lock_path"
  rm -f "$lock_path"
}

clear_stale_index_lock "."
git submodule sync --recursive
git submodule foreach --recursive '
lock_path=$(git rev-parse --git-path index.lock)
if [ -f "$lock_path" ]; then
  if command -v lsof >/dev/null 2>&1; then
    if lsof "$lock_path" >/dev/null 2>&1; then
      echo "Active git index.lock detected for $displaypath: $lock_path" >&2
      exit 1
    fi
  elif command -v fuser >/dev/null 2>&1; then
    if fuser "$lock_path" >/dev/null 2>&1; then
      echo "Active git index.lock detected for $displaypath: $lock_path" >&2
      exit 1
    fi
  else
    echo "Warning: neither lsof nor fuser is available; removing existing git index.lock for $displaypath" >&2
  fi

  echo "Removing stale git index.lock for $displaypath: $lock_path"
  rm -f "$lock_path"
fi

git reset --hard HEAD && git clean -fd
'
# Update only top-level submodules to latest remote tip
GIT_HTTP_VERSION=HTTP/1.1 git -c http.version=HTTP/1.1 submodule update --remote
# Then align nested submodules to commits pinned by each parent submodule
git submodule update --init --recursive
"""
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-update.ps1 -TaskName submodules"

["update:brew"]
description = "Homebrew パッケージを更新（formula のみ、cask は除く）"
run = "if command -v brew >/dev/null 2>&1; then (brew update 2>&1 | grep -v \"definition is invalid\" || true) && brew upgrade --formula; else echo 'Homebrew not installed, skipping brew update'; fi"
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-update.ps1 -TaskName brew"

["update:apt"]
description = "APT パッケージを更新（Ubuntu/Debian 環境）"
run = "if command -v apt-get >/dev/null 2>&1 && [ -f /etc/debian_version ]; then sudo apt-get update && sudo apt-get upgrade -y; else echo 'APT not available, skipping apt update'; fi"
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-update.ps1 -TaskName apt"

["setup:tauri:ubuntu"]
description = "Tauri アプリ開発に必要な Ubuntu/WSL システム依存をインストール"
run = "if command -v apt-get >/dev/null 2>&1 && [ -f /etc/debian_version ]; then sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf; else echo 'APT not available, skipping Tauri system deps'; fi"

["update:external-repos"]
description = "外部 Git リポジトリを更新（強制リセット）"
run = [
  "if [ -d ~/src/github.com/brookhong/Surfingkeys ]; then cd ~/src/github.com/brookhong/Surfingkeys && git fetch origin && git reset --hard origin/master && git clean -fd; else echo 'Skip: ~/src/github.com/brookhong/Surfingkeys not found'; fi",
]
run_windows = "sh ./scripts/run-windows-powershell.sh ./scripts/mise-update.ps1 -TaskName external-repos"
