# ========================================
# Agent / APM Bootstrap Tasks
# ========================================

["apm:bootstrap"]
description = "~/.apm checkout / apm.yml / packages / mise.toml を bootstrap"
run = "sh ./scripts/apm-workspace.sh bootstrap"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/apm-workspace.ps1 bootstrap"

["apm:smoke"]
description = "APM bootstrap script と workspace mise template の smoke check"
run = "sh ./scripts/apm-workspace.sh smoke"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/apm-workspace.ps1 smoke"

["agents:add"]
description = "legacy repo-local skill source を追加（例: owner/repo や tree URL）"
run = "tsx ./agents/scripts/skills-add/index.ts"

["agents:report"]
description = "インストール対象 agent の URL レポートを出力（legacy Nix）"
run = """
. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix before running agents:report" || exit $?

nix run .#report
"""

["agents:validate"]
description = "agent 構成バリデーション（legacy Nix / CI 用）"
run = """
if [ "${SKIP_NIX_VALIDATE:-0}" = "1" ]; then
  echo "Skip agents:validate (SKIP_NIX_VALIDATE=1)"
  exit 0
fi

. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix or run with SKIP_NIX_VALIDATE=1" || exit $?

cache_root="${TMPDIR:-/tmp}/${USER:-user}/dotfiles-mise-cache"
mkdir -p "$cache_root"
XDG_CACHE_HOME="$cache_root" nix run --no-write-lock-file .#validate
"""
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/skills-validate.ps1"

["agents:validate:internal"]
description = "agents/src が legacy SSoT ルールに準拠しているか検証"
run = "bash ./agents/scripts/validate-src.sh"

["agents:check:sync"]
description = "flake.nix と agent-skills-sources.nix の整合性チェック（legacy Nix）"
run = "sh ./scripts/check-flake-sync.sh"

["agents:legacy:install"]
description = "legacy Nix / Home Manager 配布を実行"
run = [{ task = "hm:switch" }]
run_windows = "powershell -ExecutionPolicy Bypass -File ./scripts/install-agent-skills.ps1 -Targets all -IncludeNixBundle"

["agents:legacy:list"]
description = "legacy Nix bundle 上の有効 agent 一覧を表示"
run = """
. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix before running agents:legacy:list" || exit $?

nix run .#list
"""

["agents:legacy:update"]
description = "legacy flake inputs を更新"
run = """
. "./mise/lib/home-manager.sh"
ensure_nix_or_fail "nix not found. Install Nix before running agents:legacy:update" || exit $?

nix flake update --flake .
"""

["agents:legacy:check"]
description = "legacy Nix / HM 配布の状態確認"
run = "scripts/skills-check.sh"

["agents:legacy:rollback"]
description = "Home Manager の前世代へロールバック"
run = [{ task = "hm:rollback" }]

["agents:legacy:upgrade"]
description = "legacy agent 全更新（update → install → check）"
run = [
  { task = "agents:legacy:update" },
  { task = "agents:legacy:install" },
  { task = "agents:legacy:check" },
]
